# The standard CI build workflow for the Python/Poetry flavour.
# 
# This is what you should use in your project, together with build.sh, to build based
# on ci-build-v2 scripts.
# 


# TODO: check if we can use reusable workflows: https://docs.github.com/en/actions/how-tos/reuse-automations/reuse-workflows
# The caller wf would have:
#
# call-standard-build:
#   uses: KnetMiner/knetminer-ci/.github/workflows/standard-build.yml@main
#   with:
#     NEW_RELEASE_VER: ${{ github.event.inputs.NEW_RELEASE_VER }}
#     NEW_SNAPSHOT_VER: ${{ github.event.inputs.NEW_SNAPSHOT_VER }}
#     ...
#   # To pass them all. Unfortunately, this doesn't seem to work across different organisations.
#   secrets: inherit
#
# And the standard-build.yml (the called workflow) would have:
# on:
#   workflow_call:
#     inputs:
#       NEW_RELEASE_VER:
#         required: false
#         type: string
#       NEW_SNAPSHOT_VER:
#         required: false
#         type: string
#

name: Standard Build

on:
  push:
    # This allows for including/excluding branches against which this workflow must (not) run.
    # See TODO for details. Note this is different than CI_DEPLOY_BRANCHES shown below.
    # branches: ...
  workflow_dispatch:
    inputs:
      # These can be set when the build is invoked manually, from GH Actions.
      #
      # Set BOTH when you want to trigger a new release. The build script will 
      # switch Maven to the new release, deploy, tag git, move Maven to the new snapshot
      #
      NEW_RELEASE_VER:
        description: "New Release Version"
        required: false
      NEW_SNAPSHOT_VER:
        description: "New Snapshot Version"
        required: false
      IS_LATEST_RELEASE:
        description: "When releasing, tells if it's a github latest release. Ignored otherwise."
        required: false
        default: "true"
      IS_PRE_RELEASE:
        description: "When releasing, tells if it's a github pre-release. Ignored otherwise."
        required: false
        default: "false"

permissions:
  # needed to push and when the repo belongs to an organisation.
  contents: write
    
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Set up Poetry
      uses: Gr1N/setup-poetry@v8
      with:
        poetry-version: "2.3.2"      
      
    - name: Cache for Poetry Virtualenvs
      uses: actions/cache@v4
      with:
        path: ~/.cache/pypoetry/virtualenvs
        key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

    - name: Build
      env:
        # 
        CI_NEW_RELEASE_VER: ${{github.event.inputs.NEW_RELEASE_VER}}
        CI_NEW_SNAPSHOT_VER: ${{github.event.inputs.NEW_SNAPSHOT_VER}}
        CI_IS_LATEST_RELEASE: ${{github.event.inputs.IS_LATEST_RELEASE}}
        CI_IS_PRE_RELEASE: ${{github.event.inputs.IS_PRE_RELEASE}}

        CI_SLACK_API_NOTIFICATION_URL: ${{secrets.CI_SLACK_API_NOTIFICATION_URL}}

        # Used during releasing, points to your PyPI API token
        POETRY_PYPI_TOKEN_PYPI: ${{secrets.POETRY_PYPI_TOKEN_PYPI}}

        # Set it up with yours, used with auto-commits
        # TODO: is this automatically available from some GHA vars?
        GIT_USER_EMAIL: ${{secrets.GIT_USER_EMAIL}}
        
        # These are usually auto-provided by GHA and you shouldn't need to change them
        GIT_USER: ${{github.actor}}
        GIT_PASSWORD: ${{github.GITHUB_TOKEN}}

        # Also used during releasing by the GH client, to create a new release on the repo
        # TODO: what's the difference with github.GITHUB_TOKEN ?
        GH_TOKEN: ${{ github.token }}        

        # What started this WF, as per GHA documentation
        CI_TRIGGERING_EVENT: ${{github.event_name}}

        # This is only set when using the act tool, to tell certain script functions to behave 
        # differently than usually (eg, some extra packages need to be installed on a act runner)
        # When using act, you need to set this somewhere like a secrets file. If set, it should 
        # be 'true' or 'false'. I couldn't find any other way to detect 'act'.
        CI_IS_ACT_TOOL: ${{ secrets.CI_IS_ACT_TOOL }}

        # A list of branches to be used for deploying or release operations. If this worflow is
        # run against a branch not listed here, deployment operations (eg, PyPI/Maven publishing)
        # will be skipped and releasing will be blocked with an error.
        # Note that you can exclude a branch from running a CI build using the GHA 'branches' option
        # (see above).
        CI_DEPLOY_BRANCHES: ${{ secrets.CI_DEPLOY_BRANCHES }}
      
      # We reuse the general CI scripts in knetminer-ci, see https://github.com/KnetMiner/knetminer-ci  
      run: 
        ./ci-build-v2/python-poetry/build.sh
