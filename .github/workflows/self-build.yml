# This is the GHA workflow used to build the CI workflow itself.
# 
# Since we don't have much more than a set of Bash scripts, this WF doesn't do much, and for
# more realistic examples, you should look at the `standard-build.yml` within your build flavour
# of choice, e.g. `python-poetry/standard-build.yml`.

name: CI Framework Build

on:
  # push:
  # As said in ci-build-v2/self-build/README.md, we don't to run this at every push at the moment, 
  # Since the only automation we have is about (manual) releasing.
  #
    
  workflow_dispatch:
    inputs:
      # These can be set when the build is invoked manually, from GH Actions.
      #
      # Set BOTH when you want to trigger a new release. The build script will 
      # switch Maven to the new release, deploy, tag git, move Maven to the new snapshot
      #
      NEW_RELEASE_VER:
        description: "New Release Version"
        required: false
      NEW_SNAPSHOT_VER:
        description: "New Snapshot Version"
        required: false
      IS_LATEST_RELEASE:
        description: "When releasing, tells if it's a github latest release. Ignored otherwise."
        required: false
        default: "true"
      IS_PRE_RELEASE:
        description: "When releasing, tells if it's a github pre-release. Ignored otherwise."
        required: false
        default: "false"

permissions:
  # needed to push and when the repo belongs to an organisation.
  contents: write
    
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@v6

    # See the knetminer-ci documentation for details
    - name: Forward secrets to env vars
      env:
        _SECRETS_JS_STR: ${{ toJSON(secrets) }}
      run: |
        # Using -c (compact) ensures the JSON is treated as a single line
        echo "$_SECRETS_JS_STR" | jq -r 'to_entries[] | "\(.key)<<EOF\n\(.value)\nEOF"' >> $GITHUB_ENV    

    - name: Build
      env:
        # 
        CI_NEW_RELEASE_VER: ${{github.event.inputs.NEW_RELEASE_VER}}
        CI_NEW_SNAPSHOT_VER: ${{github.event.inputs.NEW_SNAPSHOT_VER}}
        CI_IS_LATEST_RELEASE: ${{github.event.inputs.IS_LATEST_RELEASE}}
        CI_IS_PRE_RELEASE: ${{github.event.inputs.IS_PRE_RELEASE}}
        
        # These are usually auto-provided by GHA and you shouldn't need to change them
        GIT_USER: ${{github.actor}}
        GIT_PASSWORD: ${{github.GITHUB_TOKEN}}
        GH_TOKEN: ${{ github.token }}

        # What started this WF, as per GHA documentation
        CI_TRIGGERING_EVENT: ${{github.event_name}}
      
      # We reuse the general CI scripts in knetminer-ci, see https://github.com/KnetMiner/knetminer-ci
      # As per documentation, the framework client defines this script in the desired flavour directory,
      # the script downloads/runs the installation script and then starts the build.
      run: 
        ./ci-build-v2/self-build/build.sh
